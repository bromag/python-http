<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Cookies Demo</title>
</head>
<body>
  <h1>Cookies Demo</h1>
  <button id="set">Set Cookie</button>
  <pre id="out"></pre>

  <script>
    function show() {
      document.getElementById("out").textContent = document.cookie || "(no cookies)";
    }
    document.getElementById("set").addEventListener("click", () => {
      document.cookie = "session_id=abc123; path=/";
      document.cookie = "theme=dark; path=/";
      show();
    });
    show();
  </script>
</body>
</html>
